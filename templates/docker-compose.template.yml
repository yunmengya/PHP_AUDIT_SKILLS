# PHP 代码审计 - Docker Compose 模板
# 变量说明:
#   {{PROJECT_NAME}}  - 项目名称
#   {{PHP_VERSION}}   - PHP 版本号
#   {{DB_TYPE}}       - 数据库类型 (mysql/pgsql/sqlite)
#   {{DB_VERSION}}    - 数据库版本
#   {{NGINX_CONF}}    - Nginx 配置文件名 (laravel.conf/thinkphp.conf/yii2.conf/generic.conf)
#   {{ENABLE_REDIS}}  - 是否启用 Redis (true/false)

version: '3.8'

services:
  # PHP-FPM 应用容器
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: {{PROJECT_NAME}}_php
    volumes:
      - ./src:/var/www/html
      - ./xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini
    networks:
      - audit_network
      - internal_network
    environment:
      - PHP_IDE_CONFIG=serverName=audit
      - XDEBUG_MODE=trace,debug
      - XDEBUG_TRIGGER=1
    depends_on:
      - db
    restart: unless-stopped

  # Nginx Web 服务器
  nginx:
    image: nginx:alpine
    container_name: {{PROJECT_NAME}}_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - audit_network
    depends_on:
      - php
    restart: unless-stopped

  # 数据库服务
  db:
    # MySQL 配置
    # image: mysql:{{DB_VERSION}}
    # environment:
    #   MYSQL_ROOT_PASSWORD: audit_root_pass
    #   MYSQL_DATABASE: audit_db
    #   MYSQL_USER: audit_user
    #   MYSQL_PASSWORD: audit_pass

    # PostgreSQL 配置
    # image: postgres:{{DB_VERSION}}
    # environment:
    #   POSTGRES_DB: audit_db
    #   POSTGRES_USER: audit_user
    #   POSTGRES_PASSWORD: audit_pass

    image: mysql:8.0
    container_name: {{PROJECT_NAME}}_db
    environment:
      MYSQL_ROOT_PASSWORD: audit_root_pass
      MYSQL_DATABASE: audit_db
      MYSQL_USER: audit_user
      MYSQL_PASSWORD: audit_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - audit_network
    restart: unless-stopped

  # Redis（可选）
  # redis:
  #   image: redis:7-alpine
  #   container_name: {{PROJECT_NAME}}_redis
  #   networks:
  #     - audit_network
  #   restart: unless-stopped

  # SSRF 测试靶标容器
  # 仅在 Docker 内部网络可访问，用于验证 SSRF 漏洞
  ssrf-target:
    image: nginx:alpine
    container_name: {{PROJECT_NAME}}_ssrf_target
    networks:
      - internal_network
    restart: unless-stopped

networks:
  # 外部可访问网络
  audit_network:
    driver: bridge

  # 内部网络（仅容器间通信，模拟内网）
  internal_network:
    driver: bridge
    internal: true

volumes:
  db_data:
